<!-- Display Busuanzi pageviews (free, no-account) -->
<script defer src="https://busuanzi.ibruce.info/busuanzi/2.3/busuanzi.pure.mini.js"></script>
<script>
  (() => {
    const bindPageviews = () => {
      const pv = document.getElementById('pageviews');
      const source = document.getElementById('busuanzi_value_page_pv');
      if (!pv || !source) return;

      const extract = () => {
        const raw = (source.textContent || '').trim();
        const digits = raw.replace(/\D/g, '');
        return digits ? Number(digits) : null;
      };

      const render = () => {
        const value = extract();
        if (value !== null && Number.isFinite(value)) {
          pv.textContent = new Intl.NumberFormat().format(value);
          return true;
        }
        return false;
      };

      // 1) Immediate try
      if (render()) return;

      // 2) Observe async updates from busuanzi script
      const observer = new MutationObserver(() => {
        if (render()) observer.disconnect();
      });
      observer.observe(source, { childList: true, characterData: true, subtree: true });

      // 3) Poll briefly as backup (some browsers/extensions miss mutation events)
      let tries = 0;
      const timer = setInterval(() => {
        tries += 1;
        if (render() || tries >= 20) {
          clearInterval(timer);
          observer.disconnect();
          // 4) Graceful fallback
          if (!/\d/.test((pv.textContent || '').trim())) {
            pv.textContent = '-';
          }
        }
      }, 500);
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', bindPageviews, { once: true });
    } else {
      bindPageviews();
    }
  })();
</script>

<!-- hidden source value from busuanzi -->
<span id="busuanzi_container_page_pv" style="display:none;">
  <span id="busuanzi_value_page_pv"></span>
</span>
